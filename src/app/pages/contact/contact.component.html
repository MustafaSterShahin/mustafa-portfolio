<section class="contact-section">
  <div class="container">
    <h2>Contact</h2>
    <div class="contact-content">
      <div class="contact-info">
        <h3>Contact Information</h3>
        <p><strong>Email:</strong> mustafashahin2002&#64;gmail.com</p>
        <p><strong>Phone:</strong> +90 535 627 71 40</p>
        <p><strong>Location:</strong> Kütahya, Türkiye</p>
      </div>

      <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="contact-form" novalidate>
        <div class="form-group">
          <label for="name">Name</label>
          <input id="name" type="text" formControlName="name" placeholder="Your name" />
          <div class="error" *ngIf="contactForm.get('name')?.invalid && contactForm.get('name')?.touched">
            Name is required.
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" type="email" formControlName="email" placeholder="Your email address" />
          <div class="error" *ngIf="contactForm.get('email')?.invalid && contactForm.get('email')?.touched">
            Please enter a valid email address.
          </div>
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" formControlName="message" rows="5" placeholder="Your message"></textarea>
          <div class="error" *ngIf="contactForm.get('message')?.invalid && contactForm.get('message')?.touched">
            Message is required.
          </div>
        </div>

        <button type="submit" [disabled]="contactForm.invalid" class="btn">Send Message</button>
      </form>
    </div>
  </div>
</section>
